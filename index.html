<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>笔记</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="app-shell" aria-label="笔记软件">
      <aside class="sidebar" aria-label="笔记列表区域">
        <header class="sidebar-header">
          <h1>笔记</h1>
          <button id="newNoteButton" class="icon-button primary" type="button" aria-label="新建笔记" title="新建笔记">
            +
          </button>
        </header>

        <label class="search-box">
          <span class="visually-hidden">搜索笔记</span>
          <input id="searchInput" type="search" placeholder="搜索标题或内容" autocomplete="off" />
        </label>

        <div id="noteList" class="note-list" role="listbox" aria-label="笔记列表"></div>
      </aside>

      <section class="editor" aria-label="笔记内容区域">
        <header class="editor-toolbar">
          <p id="noteMeta" class="note-meta">自动保存</p>
          <div class="toolbar-actions">
            <fieldset id="themeToggle" class="theme-toggle" aria-label="主题模式">
              <legend class="visually-hidden">主题模式</legend>
              <label>
                <input type="radio" name="theme" value="light" />
                <span>浅色</span>
              </label>
              <label>
                <input type="radio" name="theme" value="dark" />
                <span>深色</span>
              </label>
            </fieldset>
            <button id="deleteNoteButton" class="text-button danger" type="button">删除</button>
          </div>
        </header>

        <div class="editor-body">
          <input id="titleInput" class="title-input" type="text" aria-label="笔记标题" placeholder="标题" />
          <textarea id="contentInput" class="content-input" aria-label="笔记内容" placeholder="开始记录"></textarea>
          <div id="emptyEditor" class="empty-editor" hidden>选择或新建一条笔记</div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
